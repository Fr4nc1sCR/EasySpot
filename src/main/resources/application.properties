spring.application.name=easyspot

# Puerto del servidor web
server.port=80

# Formato de fecha/hora del log
logging.pattern.dateformat=hh:mm

# Ocultar banner de Spring
spring.main.banner-mode=off

# Desactivar caché de Thymeleaf en desarrollo
spring.thymeleaf.cache=false

# =========================================================
# CONEXIÓN MYSQL AIVEN
# =========================================================

spring.datasource.url=jdbc:mysql://easyspot-easyspot-ai.j.aivencloud.com:22574/easyspot_db?ssl-mode=REQUIRED
spring.datasource.username=avnadmin
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================================
# JPA / HIBERNATE
# =========================================================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Opcional pero recomendado para MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# =========================================================
# LOGS SQL
# =========================================================

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# =========================================================
# TAMAÑO MÁXIMO DE ARCHIVOS
# =========================================================

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB