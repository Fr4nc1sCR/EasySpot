spring.application.name=easyspot

# Puerto del servidor web
server.port=80

# Formato de fecha/hora del log
logging.pattern.dateformat=hh:mm

# Ocultar banner de Spring
spring.main.banner-mode=off

# Desactivar caché de Thymeleaf en desarrollo
spring.thymeleaf.cache=false

# =========================================================
# CONEXIÓN MYSQL AIVEN
# =========================================================

spring.datasource.url=${AIVEN_DATABASE_URL}
spring.datasource.username=${AIVEN_USERNAME}
spring.datasource.password=${AIVEN_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================================
# JPA / HIBERNATE
# =========================================================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# =========================================================
# LOGS SQL
# =========================================================

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# =========================================================
# TAMAÑO MÁXIMO DE ARCHIVOS
# =========================================================

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =========================================================
# APIs
# =========================================================

google.maps.api-key=${GOOGLE_MAPS_API_KEY}