<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <head th:fragment="head(titulo, css)">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title th:text="${titulo}">EasySpot AI</title>

        <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
        <link th:href="@{/webjars/font-awesome/css/all.min.css}" rel="stylesheet">

        <link th:href="@{/css/global.css}" rel="stylesheet">
        <link th:href="@{/css/navbar.css}" rel="stylesheet">
        <link th:href="@{|/css/${css}.css|}" rel="stylesheet">
    </head>

    <body>

        <header th:fragment="publicNavbar" class="public-navbar">
            <nav class="navbar-container">
                <a th:href="@{/}" class="navbar-logo">
                    <span>EasySpot <strong>AI</strong></span>
                    <small>Smart Parking Platform</small>
                </a>

                <div class="navbar-actions">
                    <a th:href="@{/login}" class="btn-outline">Iniciar sesión</a>
                    <a th:href="@{/registro}" class="btn-primary">Registrarse</a>
                </div>
            </nav>
        </header>

        <header th:fragment="appNavbar" class="app-navbar">
            <nav class="navbar-container">

                <a th:href="@{/home}" class="navbar-logo">
                    <span>EasySpot <strong>AI</strong></span>
                    <small>Panel inteligente</small>
                </a>

                <div class="app-links">
                    <a th:href="@{/home}">Inicio</a>
                    <a th:href="@{/dashboard}">Buscar Parqueo</a>
                    <a th:href="@{/reservas}">Reservas</a>
                    <a th:href="@{/reportes}">Reportes</a>
                    <a th:href="@{/perfil}">Perfil</a>
                </div>

                <div class="navbar-right">
                    <a th:href="@{/logout}" class="logout-btn">Salir</a>
                </div>

            </nav>
        </header>

        <div th:fragment="scripts">
            <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
            <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
            <script th:src="@{/js/alerts.js}"></script>
        </div>

    </body>
</html>
